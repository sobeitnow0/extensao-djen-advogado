<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        /* Variáveis de Tema (Light/Dark) */
        :root {
            --bg-body: #ffffff; --text-main: #333333; --color-h3: #2c3e50; --color-label: #666666;
            --bg-input: #ffffff; --border-input: #cccccc; --bg-filtro: #f1f1f1; --border-filtro: #cccccc;
            --bg-intimacao: #f8f9fa; --bg-teor: #ffffff; --border-teor: #eeeeee; --color-destaque: #2c3e50; --link-rapido: #3584e4;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #1e1e1e; --text-main: #e0e0e0; --color-h3: #6cb6ff; --color-label: #aaaaaa;
                --bg-input: #2d2d2d; --border-input: #444444; --bg-filtro: #252525; --border-filtro: #444444;
                --bg-intimacao: #252525; --bg-teor: #1e1e1e; --border-teor: #333333; --color-destaque: #6cb6ff; --link-rapido: #6cb6ff;
            }
        }

        body { width: 450px; padding: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; }
        h3 { margin-top: 0; color: var(--color-h3); border-bottom: 2px solid #3584e4; padding-bottom: 8px; margin-bottom: 15px; font-size: 18px; }
        .linha-busca { display: flex; gap: 10px; margin-bottom: 12px; }
        .coluna { display: flex; flex-direction: column; flex: 3; }
        .coluna-curta { display: flex; flex-direction: column; width: 80px; }
        label { font-size: 11px; color: var(--color-label); margin-bottom: 4px; font-weight: bold; text-transform: uppercase; }
        input { padding: 8px; border: 1px solid var(--border-input); background: var(--bg-input); color: var(--text-main); border-radius: 4px; font-size: 13px; outline: none; color-scheme: light dark; }
        input:focus { border-color: #3584e4; }
        input[type="text"] { text-transform: uppercase; }

        .datas-rapidas { font-size: 11px; margin-bottom: 4px; display: flex; gap: 8px; }
        .datas-rapidas a { color: var(--link-rapido); cursor: pointer; text-decoration: none; font-weight: bold; transition: opacity 0.2s; }
        .datas-rapidas a:hover { opacity: 0.7; text-decoration: underline; }

        .btn-principal { padding: 10px; background: #3584e4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; transition: all 0.2s; font-size: 14px; }
        .btn-principal:hover:not(:disabled) { background: #1c71d8; }
        .btn-principal:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .btn-copiar { padding: 10px; background: #2da15f; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; display: none; transition: background 0.2s; }
        .btn-copiar:hover { background: #24884f; }

        #containerFiltro { background: var(--bg-filtro); padding: 10px; border-radius: 4px; margin-top: 10px; border: 1px dashed var(--border-filtro); }
        #resultados { max-height: 350px; overflow-y: auto; font-size: 13px; margin-top: 15px; }
        .intimacao { background: var(--bg-intimacao); border-left: 4px solid #3584e4; padding: 12px; margin-bottom: 12px; border-top: 1px solid var(--border-teor); border-right: 1px solid var(--border-teor); border-bottom: 1px solid var(--border-teor); border-radius: 0 4px 4px 0; }
        .teor { font-family: 'Courier New', Courier, monospace; white-space: pre-wrap; margin-top: 8px; background: var(--bg-teor); padding: 10px; border: 1px solid var(--border-teor); max-height: 120px; overflow-y: auto; font-size: 12px; line-height: 1.4; color: var(--text-main); }
        b, strong { color: var(--color-destaque); }
    </style>
</head>
<body>
    <h3>⚖️ DJEN - Buscador Nacional</h3>
    
    <div class="linha-busca">
        <div class="coluna">
            <label>OAB (Apenas números):</label>
            <input type="number" id="oabNum" placeholder="Ex: 123456">
        </div>
        <div class="coluna-curta">
            <label>UF:</label>
            <input type="text" id="oabUf" placeholder="UF" maxlength="2">
        </div>
    </div>

    <div class="datas-rapidas">
        <a id="btnHoje">[Hoje]</a>
        <a id="btn5Dias">[5 dias]</a>
        <a id="btn15Dias">[15 dias]</a>
        <a id="btnMes">[Último mês]</a>
    </div>

    <div class="linha-busca">
        <div class="coluna">
            <label>Data Inicial:</label>
            <input type="date" id="dataInicio">
        </div>
        <div class="coluna">
            <label>Data Final:</label>
            <input type="date" id="dataFim">
        </div>
    </div>
    
    <button id="btnBuscar" class="btn-principal">Consultar Intimações</button>
    
    <div id="containerFiltro" style="display:none;">
        <label>🔍 Filtrar nos resultados (Busca Dinâmica):</label>
        <input type="text" id="filtroRapido" placeholder="Digite para filtrar instantaneamente..." style="width: 100%; box-sizing: border-box; margin-top:5px; text-transform: none;">
    </div>

    <button id="btnCopiarTodos" class="btn-copiar">Copiar Resultados para Outlining</button>
    <div id="resultados"></div>

    <script src="popup.js"></script>
</body>
</html>
