<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 450px; padding: 15px; font-family: sans-serif; background: #fff; color: #333; margin: 0; }
        h3 { margin-top: 0; color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        .linha-busca { display: flex; gap: 10px; margin-bottom: 12px; }
        .coluna { display: flex; flex-direction: column; flex: 3; }
        .coluna-curta { display: flex; flex-direction: column; width: 70px; }
        label { font-size: 11px; color: #666; margin-bottom: 4px; font-weight: bold; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        input[type="text"] { text-transform: uppercase; }
        button { padding: 10px; background: #3584e4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 15px; }
        button:hover { background: #1c71d8; }
        #resultados { max-height: 350px; overflow-y: auto; font-size: 13px; }
        .intimacao { background: #f8f9fa; border-left: 4px solid #3584e4; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .teor { font-family: monospace; white-space: pre-wrap; margin-top: 5px; background: white; padding: 8px; border: 1px solid #eee; max-height: 150px; overflow-y: auto; }
        .btn-copiar { background: #2da15f; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <h3>⚖️ DJEN - Consulta de Intimações</h3>
    <div class="linha-busca">
        <div class="coluna">
            <label>Número da OAB:</label>
            <input type="number" id="oabNum" value="349457">
        </div>
        <div class="coluna-curta">
            <label>UF:</label>
            <input type="text" id="oabUf" value="SP" maxlength="2">
        </div>
    </div>
    <div class="linha-busca">
        <div class="coluna">
            <label>Início:</label>
            <input type="date" id="dataInicio">
        </div>
        <div class="coluna">
            <label>Fim:</label>
            <input type="date" id="dataFim">
        </div>
    </div>
    <button id="btnBuscar">Buscar na API</button>
    <div id="resultados"></div>
    <button id="btnCopiarTodos" class="btn-copiar">Copiar Resultados</button>
    <script src="popup.js"></script>
</body>
</html>
